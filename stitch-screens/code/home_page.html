<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e63746",
                        "background-light": "#f8f6f6",
                        "background-dark": "#211112",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .hero-gradient {
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.7));
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Main Hero Container -->
<div class="relative flex h-screen w-full flex-col items-center justify-center overflow-hidden">
<!-- Background Image -->
<div class="absolute inset-0 z-0">
<img alt="Gourmet Burger" class="h-full w-full object-cover" data-alt="Close up of a juicy gourmet cheeseburger with fresh toppings" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCyRo0M0DvOO3WhD30FmLglTw5ccXn-RPyDFgRn7gBo0rcFAuiumTQq-n8NwfNQRNaCHYfvojdBakqPN9laFLQB_fUYwHu6oRjIyzMgHvHmnI-0OyVVH45dkPXvotzJgO6imOeBTgRAp0J_1XAe7gKWL-W3xzteyRcRyrXXlLCKBtnKERzmbVZjqE6HtNuBEHuYT0GYBD9YMem_8BNxTCxfkCZHOpsg2MS_aCjpnpTrPHx0QjSvY9XqfKzzBUpNNkbT67e0jy8dA30"/>
<div class="absolute inset-0 hero-gradient"></div>
</div>
<!-- Content Overlay -->
<div class="relative z-10 flex flex-col items-center px-4 text-center">
<!-- Logo Section -->
<div class="mb-8 flex flex-col items-center gap-4">
<div class="flex h-20 w-20 items-center justify-center rounded-xl bg-primary text-white shadow-2xl">
<span class="material-symbols-outlined !text-5xl">restaurant</span>
</div>
<h1 class="text-5xl font-extrabold tracking-tight text-white md:text-7xl">
                        The Digital Grill
                    </h1>
</div>
<!-- Tagline -->
<p class="mb-12 text-xl font-medium tracking-wide text-white/90 md:text-3xl">
                    Fresh. Fast. Delicious.
                </p>
<!-- CTA Button -->
<button class="group flex min-w-[280px] cursor-pointer items-center justify-center gap-3 overflow-hidden rounded-full bg-primary px-10 py-6 text-2xl font-bold text-white shadow-2xl transition-transform hover:scale-105 active:scale-95">
<span class="material-symbols-outlined !text-3xl">touch_app</span>
<span>Start Order</span>
</button>
<!-- Secondary Info -->
<div class="mt-16 flex items-center gap-8 text-white/80">
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined">schedule</span>
<span class="text-sm font-semibold uppercase tracking-widest">Fast Prep</span>
</div>
<div class="h-8 w-px bg-white/20"></div>
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined">eco</span>
<span class="text-sm font-semibold uppercase tracking-widest">Fresh Ingredients</span>
</div>
<div class="h-8 w-px bg-white/20"></div>
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined">payments</span>
<span class="text-sm font-semibold uppercase tracking-widest">Easy Pay</span>
</div>
</div>
</div>
<!-- Language / Accessibility Toggle (Bottom Right) -->
<div class="absolute bottom-10 right-10 flex gap-4">
<button class="flex h-12 w-12 items-center justify-center rounded-full bg-white/10 text-white backdrop-blur-md hover:bg-white/20">
<span class="material-symbols-outlined">language</span>
</button>
<button class="flex h-12 w-12 items-center justify-center rounded-full bg-white/10 text-white backdrop-blur-md hover:bg-white/20">
<span class="material-symbols-outlined">accessibility_new</span>
</button>
</div>
<!-- App Store/Brand Footer (Bottom Left) -->
<div class="absolute bottom-10 left-10 flex items-center gap-3 text-white/60">
<span class="text-xs font-bold uppercase tracking-widest">Powered by Digital Grill Tech</span>
</div>
</div>
</div>
</body></html>
